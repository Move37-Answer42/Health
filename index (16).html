{id:"air-fryer-chicken-wrap",name:"Air Fryer Chicken Salad Wrap",protein:45,time:12,category:"quick",serves:1,tool:"Air fryer",notes:"Your default. Keep these ingredients always stocked.",ingredients:[{name:"Frozen chicken strips or nuggets",amount:"6-8 pieces",section:"frozen"},{name:"Pre-built bagged salad mix",amount:"1/2 bag",section:"produce"},{name:"Large flour tortilla or wrap",amount:"1",section:"pantry"},{name:"Dressing of choice",amount:"2 tbsp",section:"pantry"}],instructions:["Air fryer 380F, 10-12 min until crispy.","Empty half the bagged salad into a bowl.","Slice or chop the chicken, toss with salad and dressing.","Pile into wrap, fold, eat."]},{id:"air-fryer-chicken-bowl",name:"Air Fryer Chicken Salad Bowl",protein:50,time:12,category:"quick",serves:1,tool:"Air fryer",notes:"Same as the wrap but skip the tortilla - lower carb, higher protein density.",ingredients:[{name:"Chicken breast (fresh or frozen)",amount:"6-8 oz",section:"meat"},{name:"Pre-built bagged salad mix",amount:"1/2 bag",section:"produce"},{name:"Avocado",amount:"1/2",section:"produce"},{name:"Dressing or olive oil + lemon",amount:"2 tbsp",section:"pantry"},{name:"Salt, pepper, paprika",amount:"to taste",section:"pantry"}],instructions:["Season chicken. Air fryer 380F, 12-14 min, flipping halfway.","Slice chicken on a cutting board.","Empty salad into a bowl, top with chicken and avocado.","Dress and toss."]},{id:"air-fryer-chicken-rice",name:"Air Fryer Chicken + Microwave Rice + Frozen Veg",protein:50,time:15,category:"quick",serves:1,tool:"Air fryer",notes:"Fast, hot, hits everything. Use your frozen peas & carrots or any frozen veg.",ingredients:[{name:"Chicken breast",amount:"6-8 oz",section:"meat"},{name:"Microwave rice pouch (jasmine or brown)",amount:"1 pouch",section:"pantry"},{name:"Frozen veg (peas/carrots/broccoli)",amount:"1.5 cups",section:"frozen"},{name:"Soy sauce or teriyaki",amount:"2 tbsp",section:"pantry"},{name:"Garlic powder, paprika",amount:"to taste",section:"pantry"}],instructions:["Season chicken. Air fryer 380F, 12-14 min.","Microwave rice 90 sec.","Microwave frozen veg with a splash of water 4 min.","Plate, drizzle soy/teriyaki, eat."]},{id:"air-fryer-salmon",name:"Air Fryer Salmon + Pre-Built Salad",protein:42,time:12,category:"quick",serves:1,tool:"Air fryer",ingredients:[{name:"Salmon fillet",amount:"6 oz",section:"seafood"},{name:"Pre-built bagged salad",amount:"1/2 bag",section:"produce"},{name:"Lemon",amount:"1/2",section:"produce"},{name:"Olive oil",amount:"1 tbsp",section:"pantry"},{name:"Salt, pepper, garlic powder",amount:"to taste",section:"pantry"}],instructions:["Season salmon. Air fryer 400F, 8-10 min.","Toss salad with olive oil, lemon juice, S&P.","Plate salmon over salad."]},{id:"deli-sandwich-stacked",name:"Loaded Deli Sandwich",protein:38,time:5,category:"quick",serves:1,notes:"When you don't want to cook. Stack it heavy on protein.",ingredients:[{name:"Whole grain or sourdough bread",amount:"2 slices",section:"pantry"},{name:"Sliced turkey or roast beef (deli)",amount:"5-6 oz",section:"meat"},{name:"Cheese slices",amount:"1-2",section:"dairy"},{name:"Lettuce, tomato, red onion",amount:"as desired",section:"produce"},{name:"Mustard, mayo, or both",amount:"to taste",section:"pantry"}],instructions:["Toast bread if you want.","Layer condiments, meat, cheese, veg.","Done. Eat over the sink if necessary."]},{id:"tuna-greek-yogurt",name:"Tuna & Greek Yogurt Salad",protein:38,time:5,category:"quick",serves:1,notes:"5-min throw-together. Greek yogurt instead of mayo for protein boost.",ingredients:[{name:"Canned tuna in water",amount:"2 cans (5 oz)",section:"pantry"},{name:"Plain Greek yogurt (2%)",amount:"1/3 cup",section:"dairy"},{name:"Celery",amount:"2 stalks",section:"produce"},{name:"Red onion",amount:"1/4",section:"produce"},{name:"Dijon mustard",amount:"1 tsp",section:"pantry"},{name:"Whole grain crackers or bread",amount:"as desired",section:"pantry"}],instructions:["Drain tuna, flake into bowl.","Add Greek yogurt, mustard, lemon juice. Mix.","Dice celery and onion fine, fold in.","Eat on crackers, toast, or over greens."]},{id:"quick-butter-chicken",name:"20-Min Butter Chicken (Patak's)",protein:45,time:20,category:"quick",serves:3,notes:"Uses your Patak's Butter Chicken simmer sauce. From start to bowl in 20 min.",ingredients:[{name:"Chicken breast or thighs (cubed)",amount:"1.25 lbs",section:"meat"},{name:"Patak's Butter Chicken simmer sauce",amount:"1 jar",section:"pantry"},{name:"Heavy cream or coconut milk",amount:"1/4 cup",section:"dairy"},{name:"Butter",amount:"2 tbsp",section:"dairy"},{name:"Microwave basmati rice",amount:"3 pouches",section:"pantry"},{name:"Naan (optional)",amount:"to serve",section:"pantry"},{name:"Fresh cilantro",amount:"small handful",section:"produce"}],instructions:["Heat butter in a skillet. Add cubed chicken, sear 4-5 min until golden.","Pour Patak's sauce over. Simmer 8 min.","Stir in cream or coconut milk. Simmer 2 more min.","Microwave rice while chicken finishes.","Serve over rice. Top with cilantro. Naan on the side."]},{id:"bucatini-carbonara",name:"Bucatini Carbonara",protein:38,time:15,category:"quick",serves:2,notes:"Classic carbonara. No cream - eggs and cheese make it silky. Uses your bucatini.",ingredients:[{name:"Bucatini (or spaghetti)",amount:"0.5 lb",section:"pantry"},{name:"Bacon or pancetta (diced)",amount:"4 oz",section:"meat"},{name:"Eggs (whole)",amount:"2",section:"dairy"},{name:"Egg yolks",amount:"2",section:"dairy"},{name:"Parmesan or Pecorino (grated)",amount:"3/4 cup",section:"dairy"},{name:"Black pepper (lots)",amount:"to taste",section:"pantry"}],instructions:["Boil heavily salted pasta water. Cook bucatini per package, save 1 cup pasta water.","Render bacon in a cold pan until crispy. Don't drain fat.","Whisk eggs + yolks + cheese + lots of black pepper in a bowl.","When pasta is done, transfer hot pasta to bacon pan, off heat.","Pour egg mixture over pasta. Toss VIGOROUSLY, adding splashes of pasta water to make a silky sauce.","Serve immediately with more cheese and pepper."]},{id:"air-fryer-pork-chops",name:"Air Fryer Pork Rib Chops",protein:42,time:18,category:"quick",serves:2,tool:"Air fryer",notes:"Use your Prairie Fresh center-cut rib chops. Pat dry, season hard, don't overcook past 145F.",ingredients:[{name:"Center cut pork rib chops (thawed)",amount:"2 (~6 oz each)",section:"meat"},{name:"Olive oil",amount:"1 tbsp",section:"pantry"},{name:"Smoked paprika",amount:"1 tsp",section:"pantry"},{name:"Garlic powder",amount:"1 tsp",section:"pantry"},{name:"Salt, black pepper",amount:"to taste",section:"pantry"}],instructions:["Pat chops bone-dry with paper towels.","Rub with olive oil. Season heavily on both sides.","Air fryer 400F, 10-12 min flipping at the halfway mark.","Pull at 145F internal (instant-read thermometer).","Rest 3-5 min before slicing."]},{id:"air-fryer-wings",name:"Air Fryer Wings (Buffalo or BBQ)",protein:40,time:30,category:"quick",serves:2,tool:"Air fryer",notes:"Frozen or fresh wings. Crispier than oven, faster than deep frying. Use your Kinder's BBQ for the sauce.",ingredients:[{name:"Chicken wings (split, fresh or frozen)",amount:"1.5 lbs",section:"meat"},{name:"Olive oil",amount:"1 tbsp",section:"pantry"},{name:"Baking powder (for crispy)",amount:"1 tsp",section:"pantry"},{name:"Salt, garlic powder, paprika",amount:"1 tsp each",section:"pantry"},{name:"For Buffalo: hot sauce + butter",amount:"1/2 cup + 3 tbsp",section:"pantry"},{name:"For BBQ: Kinder's BBQ sauce",amount:"1/2 cup",section:"pantry"}],instructions:["If frozen: air fryer 380F, 15 min first to thaw. If fresh: skip.","Pat wings dry, toss with oil, baking powder, salt, spices.","Air fryer 400F, 22-25 min total, flipping at 12 min.","Toss hot wings in chosen sauce.","Serve with ranch, celery sticks."]},// ===== BATCH (cook once, eat 3-4 times) =====
{id:"slow-cooker-beef-chili",name:"Slow Cooker Spicy Beef Chili",protein:42,time:15,category:"batch",serves:4,tool:"Slow cooker",notes:"Active prep is 15 min. Use your 90/10 ground round. 4 meals from one pot.",ingredients:[{name:"Ground beef (90/10 ground round)",amount:"2 lbs",section:"meat"},{name:"Yellow onion",amount:"1 large",section:"produce"},{name:"Garlic",amount:"4 cloves",section:"produce"},{name:"Diced tomatoes (canned)",amount:"2 (15 oz)",section:"pantry"},{name:"Kidney beans",amount:"1 can (15 oz)",section:"pantry"},{name:"Black beans",amount:"1 can (15 oz)",section:"pantry"},{name:"Chili powder",amount:"3 tbsp",section:"pantry"},{name:"Cumin",amount:"1 tbsp",section:"pantry"},{name:"Smoked paprika",amount:"1 tsp",section:"pantry"},{name:"Cayenne or chipotle (for heat)",amount:"1/2-1 tsp",section:"pantry"}],instructions:["Brown beef with chopped onion and garlic in a skillet, drain fat.","Transfer to slow cooker with all remaining ingredients.","Cook on low 6-8 hours or high 3-4 hours.","Top with shredded cheese, sour cream, hot sauce, or scallions.","Reheat single servings as needed during the week."]},{id:"slow-cooker-chicken-curry",name:"Slow Cooker Coconut Chicken Curry",protein:40,time:15,category:"batch",serves:4,tool:"Slow cooker",notes:"Set in the morning, eat all week. Goes great over rice.",ingredients:[{name:"Boneless skinless chicken thighs",amount:"2 lbs",section:"meat"},{name:"Yellow onion",amount:"1 large",section:"produce"},{name:"Garlic",amount:"5 cloves",section:"produce"},{name:"Fresh ginger",amount:"1.5 inch piece",section:"produce"},{name:"Coconut milk (full fat)",amount:"1 can (14 oz)",section:"pantry"},{name:"Tomato paste",amount:"2 tbsp",section:"pantry"},{name:"Curry powder",amount:"3 tbsp",section:"pantry"},{name:"Cumin, turmeric",amount:"1 tsp each",section:"pantry"},{name:"Chicken broth (or Better Than Bouillon)",amount:"1 cup",section:"pantry"},{name:"Microwave rice (jasmine or basmati)",amount:"4 pouches",section:"pantry"}],instructions:["Chop onion, mince garlic and ginger. Cube chicken into 2-inch pieces.","Add everything except rice to slow cooker. Stir.","Cook on low 6 hours or high 3 hours.","Serve over microwave rice. Reheats beautifully - gets better day 2 and 3."]},{id:"lamb-korma-kit",name:"Slow Cooker Lamb Korma (Patak's Kit)",protein:42,time:15,category:"batch",serves:4,tool:"Slow cooker",notes:"Uses your Durban Curry in a Box Lamb Korma kit. Active time 15 min, 6 hours of slow cooker patience.",ingredients:[{name:"Lamb stew meat (cubed)",amount:"1.5 lbs",section:"meat"},{name:"Patak's Lamb Korma kit",amount:"1 box",section:"pantry"},{name:"Yellow onion (diced)",amount:"1 large",section:"produce"},{name:"Plain Greek yogurt or coconut cream",amount:"1/2 cup",section:"dairy"},{name:"Microwave basmati rice",amount:"4 pouches",section:"pantry"},{name:"Naan (optional)",amount:"to serve",section:"pantry"}],instructions:["Brown lamb cubes in a skillet, 4 min. Transfer to slow cooker.","Add diced onion + kit's spice blend and sauce per the box.","Cook on low 6 hours.","Stir in yogurt or coconut cream in last 30 min.","Serve over basmati with optional naan."]},{id:"frikkadel",name:"Frikkadel (SA Meatballs)",protein:38,time:35,category:"batch",serves:4,notes:"South African baked meatballs. Use your 90/10 ground round. Holds well as leftovers.",ingredients:[{name:"Ground beef",amount:"1.5 lbs",section:"meat"},{name:"Onion (grated)",amount:"1 medium",section:"produce"},{name:"Garlic",amount:"2 cloves",section:"produce"},{name:"Egg",amount:"1 large",section:"dairy"},{name:"Breadcrumbs",amount:"1/2 cup",section:"pantry"},{name:"Milk",amount:"1/4 cup",section:"dairy"},{name:"Ground coriander",amount:"1 tsp",section:"pantry"},{name:"Nutmeg",amount:"1/4 tsp",section:"pantry"},{name:"Salt, black pepper",amount:"to taste",section:"pantry"}],instructions:["Preheat oven to 375F.","Soak breadcrumbs in milk 5 min.","Mix beef + grated onion + garlic + soaked crumbs + egg + spices.","Form into 1.5-inch balls (about 16).","Place on lined sheet pan, bake 25 min.","Serve with mashed potatoes and gravy or in a tomato gravy. Holds well 4 days."]},{id:"brown-onion-pot-roast",name:"Brown Onion Soup Pot Roast (SA Style)",protein:45,time:15,category:"batch",serves:6,tool:"Slow cooker",notes:"South African Sunday-roast shortcut. Your Knorr Brown Onion Soup packet does the work. Falls apart by hour 8.",ingredients:[{name:"Chuck roast",amount:"3 lbs",section:"meat"},{name:"Knorr Brown Onion Soup packet",amount:"1",section:"pantry"},{name:"Yellow onion (sliced)",amount:"2 large",section:"produce"},{name:"Garlic",amount:"5 cloves",section:"produce"},{name:"Carrots (chunks)",amount:"4",section:"produce"},{name:"Yukon gold potatoes",amount:"1.5 lbs",section:"produce"},{name:"Beef broth (or Better Than Bouillon)",amount:"2 cups",section:"pantry"},{name:"Worcestershire sauce",amount:"2 tbsp",section:"pantry"},{name:"Bay leaves",amount:"2",section:"pantry"}],instructions:["Optional but worth it: sear chuck roast 3-4 min per side in a hot skillet.","Put sliced onions, garlic, carrots, potatoes in slow cooker.","Top with roast. Sprinkle Knorr packet over. Pour broth + Worcestershire around.","Add bay leaves.","Cook on low 8 hours or high 4-5 hours.","Shred roast with two forks, mix into gravy. Serve."]},{id:"venison-stew",name:"Slow Cooker Venison Stew",protein:42,time:20,category:"batch",serves:4,tool:"Slow cooker",notes:"Use your Meat Shop venison. Slow cook tenderizes it beautifully. Winter staple.",ingredients:[{name:"Venison stew meat (or cubed steak)",amount:"2 lbs",section:"meat"},{name:"Yukon gold potatoes",amount:"1.5 lbs",section:"produce"},{name:"Carrots",amount:"4 large",section:"produce"},{name:"Yellow onion",amount:"1 large",section:"produce"},{name:"Garlic",amount:"5 cloves",section:"produce"},{name:"Mushrooms (optional)",amount:"8 oz",section:"produce"},{name:"Better Than Bouillon beef base + water",amount:"3 cups broth",section:"pantry"},{name:"Tomato paste",amount:"2 tbsp",section:"pantry"},{name:"Red wine",amount:"1/2 cup",section:"pantry"},{name:"Worcestershire",amount:"2 tbsp",section:"pantry"},{name:"Flour",amount:"3 tbsp",section:"pantry"},{name:"Bay leaves, thyme, rosemary",amount:"2 leaves + 1 tsp each",section:"pantry"}],instructions:["Thaw venison fully. Toss with flour, salt, pepper.","Brown in skillet 3 min, transfer to slow cooker.","Add chopped veg + all remaining ingredients.","Cook on low 8 hours or high 4 hours.","Remove bay leaves before serving."]},{id:"stovetop-bolognese",name:"Stovetop Bolognese",protein:38,time:60,category:"batch",serves:3,notes:"Active prep 20, simmer 40. Yields ~3 solid meals.",ingredients:[{name:"Ground beef (90/10 ground round)",amount:"1 lb",section:"meat"},{name:"Italian sausage (sweet or hot)",amount:"0.5 lb",section:"meat"},{name:"Onion",amount:"1",section:"produce"},{name:"Carrot",amount:"1",section:"produce"},{name:"Celery",amount:"2 stalks",section:"produce"},{name:"Garlic",amount:"4 cloves",section:"produce"},{name:"Crushed tomatoes",amount:"1 can (28 oz)",section:"pantry"},{name:"Tomato paste",amount:"2 tbsp",section:"pantry"},{name:"Pasta (rigatoni or bucatini)",amount:"1 lb",section:"pantry"},{name:"Italian seasoning",amount:"1 tbsp",section:"pantry"},{name:"Parmesan",amount:"to top",section:"dairy"}],instructions:["Finely dice onion, carrot, celery. Mince garlic.","Brown beef and sausage in a heavy pot, breaking up.","Add veg and garlic, cook 5 min until soft.","Add tomato paste, stir 1 min. Add crushed tomatoes and seasoning.","Simmer 30-40 min, partially covered.","Cook pasta separately. Top with sauce and parmesan.","Sauce keeps 4-5 days in the fridge."]},{id:"slow-cooker-beef-stew",name:"Slow Cooker Beef Stew (Spicy)",protein:42,time:20,category:"batch",serves:4,tool:"Slow cooker",notes:"Winter favorite. Add a chipotle pepper or two for the heat you like.",ingredients:[{name:"Beef stew meat (chuck, cubed)",amount:"2 lbs",section:"meat"},{name:"Carrots",amount:"4 large",section:"produce"},{name:"Yukon gold potatoes",amount:"1.5 lbs",section:"produce"},{name:"Yellow onion",amount:"1 large",section:"produce"},{name:"Garlic",amount:"5 cloves",section:"produce"},{name:"Beef broth (or Better Than Bouillon)",amount:"3 cups",section:"pantry"},{name:"Tomato paste",amount:"2 tbsp",section:"pantry"},{name:"Worcestershire sauce",amount:"2 tbsp",section:"pantry"},{name:"Chipotle peppers in adobo",amount:"1-2 peppers + 1 tbsp sauce",section:"pantry"},{name:"Flour",amount:"3 tbsp",section:"pantry"},{name:"Bay leaves, thyme",amount:"2 leaves, 1 tsp",section:"pantry"}],instructions:["Pat beef dry, toss with flour, salt, pepper.","Optional but worth it: brown beef in a hot skillet 4 min, transfer to slow cooker.","Chop veg into chunks. Add to slow cooker with all remaining ingredients.","Cook on low 8 hours or high 4 hours.","Remove bay leaves before serving."]},{id:"instant-pot-chicken-stew",name:"Instant Pot Spicy Chicken & Bean Stew",protein:40,time:25,category:"batch",serves:4,tool:"Instant Pot",notes:"30 min start to finish. Strong winter weeknight option.",ingredients:[{name:"Chicken thighs (boneless skinless)",amount:"1.5 lbs",section:"meat"},{name:"Yellow onion",amount:"1",section:"produce"},{name:"Bell pepper",amount:"1",section:"produce"},{name:"Garlic",amount:"4 cloves",section:"produce"},{name:"Diced tomatoes",amount:"1 can (15 oz)",section:"pantry"},{name:"Cannellini or pinto beans",amount:"1 can (15 oz)",section:"pantry"},{name:"Chicken broth",amount:"1.5 cups",section:"pantry"},{name:"Smoked paprika, cumin, oregano",amount:"1 tbsp each",section:"pantry"},{name:"Cayenne or red pepper flakes",amount:"to heat preference",section:"pantry"}],instructions:["Saute mode: cook diced onion, pepper, garlic in oil 4 min.","Add chicken (whole thighs or rough cubes), spices, and stir 1 min.","Add tomatoes, beans, broth.","Pressure cook high 12 min. Natural release 10 min.","Shred chicken in the pot with two forks. Serve."]},{id:"sheet-pan-chicken",name:"Sheet Pan Chicken & Veg",protein:45,time:35,category:"batch",serves:4,ingredients:[{name:"Chicken thighs (boneless, skinless)",amount:"1.5 lbs",section:"meat"},{name:"Broccoli",amount:"1 head",section:"produce"},{name:"Bell peppers",amount:"2 large",section:"produce"},{name:"Olive oil",amount:"3 tbsp",section:"pantry"},{name:"Garlic powder, paprika, oregano",amount:"1 tsp each",section:"pantry"}],instructions:["Preheat oven to 425F.","Cut chicken thighs and vegetables into roughly even pieces.","Toss with olive oil and seasonings on a large sheet pan.","Roast 25-30 minutes, flipping halfway.","Optional: serve over rice. Holds 4 days in the fridge."]},// ===== WEEKEND / GUEST =====
{id:"lamb-shanks",name:"Braised Lamb Shanks",protein:55,time:180,category:"guest",serves:4,notes:"Active prep 30 min, then mostly hands-off in the oven. Restaurant-quality.",ingredients:[{name:"Lamb shanks",amount:"4",section:"meat"},{name:"Yellow onion",amount:"1 large",section:"produce"},{name:"Carrots",amount:"3",section:"produce"},{name:"Celery",amount:"3 stalks",section:"produce"},{name:"Garlic",amount:"8 cloves",section:"produce"},{name:"Red wine (dry)",amount:"1.5 cups",section:"pantry"},{name:"Beef broth (or Better Than Bouillon)",amount:"2 cups",section:"pantry"},{name:"Crushed tomatoes",amount:"1 can (15 oz)",section:"pantry"},{name:"Tomato paste",amount:"3 tbsp",section:"pantry"},{name:"Fresh rosemary, thyme",amount:"small bundle",section:"produce"},{name:"Flour",amount:"1/4 cup",section:"pantry"},{name:"Olive oil",amount:"3 tbsp",section:"pantry"}],instructions:["Preheat oven to 325F.","Pat shanks dry, salt heavily, dust with flour.","Sear in olive oil in a Dutch oven, 3 min each side. Remove.","Cook diced onion, carrot, celery, garlic 8 min.","Add tomato paste, stir 1 min. Deglaze with wine, reduce by half.","Add tomatoes, broth, herbs. Return shanks (mostly submerged).","Cover, oven 2.5 hours until fork-tender.","Serve over polenta, mashed potatoes, or with crusty bread."]},{id:"durban-beef-curry",name:"Durban Beef Curry",protein:50,time:120,category:"guest",serves:6,notes:"The real deal. Strong heat, fragrant, gets better day 2-3. Leftover + hollowed-out white bread loaf = Curry Bunny.",ingredients:[{name:"Beef chuck (cubed)",amount:"2.5 lbs",section:"meat"},{name:"Yellow onion",amount:"2 large",section:"produce"},{name:"Garlic",amount:"6 cloves",section:"produce"},{name:"Fresh ginger",amount:"2-inch piece",section:"produce"},{name:"Diced tomatoes",amount:"1 can (15 oz)",section:"pantry"},{name:"Tomato paste",amount:"2 tbsp",section:"pantry"},{name:"Curry powder (Madras or hot)",amount:"3 tbsp",section:"pantry"},{name:"Garam masala",amount:"1 tbsp",section:"pantry"},{name:"Cumin, coriander, turmeric",amount:"1 tsp each",section:"pantry"},{name:"Cinnamon stick",amount:"1",section:"pantry"},{name:"Cardamom pods",amount:"4",section:"pantry"},{name:"Beef broth (or Knorrox)",amount:"2 cups",section:"pantry"},{name:"Cayenne (to taste)",amount:"1/2-1 tsp",section:"pantry"},{name:"Basmati rice",amount:"2 cups dry",section:"pantry"}],instructions:["Salt beef heavily. Brown in batches in a heavy pot, 3 min per side. Set aside.","Dice onion, mince garlic and ginger. Saute onion 8-10 min until deep gold.","Add garlic, ginger, then curry powder + garam masala. Toast 1 min.","Add tomato paste, stir 1 min. Add canned tomato + remaining spices + cinnamon + cardamom.","Beef back in. Pour in broth. Bring to simmer.","Cover, low heat 90 min until fork-tender. Skim oil from top.","Cook rice last 20 min. Serve with rice, optional yogurt, fresh coriander.","Curry Bunny variation: hollow out half a white bread loaf, fill with hot curry, replace bread 'lid'."]},{id:"bobotie",name:"Bobotie",protein:35,time:70,category:"guest",serves:4,notes:"South African comfort classic. Spiced minced meat with a custard top. Serve with yellow rice (rice + turmeric + raisins).",ingredients:[{name:"Ground beef (or lamb)",amount:"1.5 lbs",section:"meat"},{name:"Onion (finely diced)",amount:"1 large",section:"produce"},{name:"Garlic",amount:"3 cloves",section:"produce"},{name:"Curry powder",amount:"2 tbsp",section:"pantry"},{name:"Mango chutney or apricot jam",amount:"3 tbsp",section:"pantry"},{name:"Raisins",amount:"1/3 cup",section:"pantry"},{name:"Bread slice soaked in milk",amount:"1 slice + 1/4 cup milk",section:"pantry"},{name:"Worcestershire sauce",amount:"1 tbsp",section:"pantry"},{name:"Bay leaves",amount:"3",section:"pantry"},{name:"Eggs",amount:"2",section:"dairy"},{name:"Milk",amount:"3/4 cup",section:"dairy"},{name:"Slivered almonds (optional)",amount:"1/4 cup",section:"pantry"}],instructions:["Preheat oven to 350F.","Saute onion 5 min, add garlic and curry powder, cook 1 min.","Add ground meat, brown 5 min. Drain excess fat.","Squeeze milk out of soaked bread, crumble into meat. Add chutney, raisins, Worcestershire, almonds. Mix.","Press mixture into a baking dish. Stick bay leaves vertically into top.","Whisk eggs with milk. Pour over meat.","Bake 35-40 min until custard top is set and golden.","Serve with yellow rice (rice cooked with turmeric and a handful of raisins)."]},{id:"venison-steaks-seared",name:"Pan-Seared Venison Steaks",protein:45,time:20,category:"guest",serves:2,notes:"From your Meat Shop venison. Lean meat - don't overcook past medium-rare or it gets tough.",ingredients:[{name:"Venison steaks (thawed fully)",amount:"2 (~6 oz each)",section:"meat"},{name:"Butter",amount:"3 tbsp",section:"dairy"},{name:"Garlic (smashed)",amount:"3 cloves",section:"produce"},{name:"Fresh rosemary, thyme",amount:"small bundle",section:"produce"},{name:"Olive oil",amount:"1 tbsp",section:"pantry"},{name:"Salt, black pepper",amount:"to taste",section:"pantry"},{name:"Red wine (optional, pan sauce)",amount:"1/2 cup",section:"pantry"}],instructions:["Thaw venison fully. Pat very dry, salt heavily, let sit 20 min at room temp.","Heat cast iron until smoking. Add olive oil.","Sear steaks 2-3 min per side for medium-rare (internal 130-135F). DO NOT overcook.","Add butter, garlic, herbs. Baste 30 sec.","Optional pan sauce: remove steaks, deglaze with red wine, reduce 2 min.","Rest steaks 5-7 min. Slice against grain. Serve."]},{id:"roast-chicken",name:"Whole Roast Chicken + Roasted Roots",protein:50,time:90,category:"guest",serves:4,ingredients:[{name:"Whole chicken (4-5 lbs)",amount:"1",section:"meat"},{name:"Carrots",amount:"4",section:"produce"},{name:"Yukon gold potatoes",amount:"1.5 lbs",section:"produce"},{name:"Onion",amount:"1 large",section:"produce"},{name:"Garlic",amount:"1 head",section:"produce"},{name:"Lemon",amount:"1",section:"produce"},{name:"Fresh thyme, rosemary",amount:"small bunch each",secti in","Hips piking up too high — defeats the purpose","Holding breath — breathe steadily throughout"],equipment:{primary:"Bodyweight",progression:"Increase hold time, not weight"},tip:"If 30 sec is easy, hold 45 or 60. Progress by time, not by adding weight."},"Reverse Flys":{steps:["Hold light dumbbells, hinge forward at hips ~45°.","Let arms hang down with a slight bend in elbows.","Raise both arms out to the sides, leading with elbows.","Squeeze shoulder blades together at the top.","Lower with control to start."],mistakes:["Using too much weight — this is a small-muscle exercise, light is right","Shrugging shoulders up — keep them down and away from ears","Standing too upright — proper hinge is essential"],equipment:{primary:"Light band, anchored at chest height (door, post)",alt:"Light DBs would also work but bands feel better here"},tip:"These work the rear delts and rhomboids — critical for posture and shoulder health. Don't skip them."},"Glute Bridges":{steps:["Lie on your back, knees bent, feet flat on floor close to your butt.","Place arms at sides for balance.","Press through heels and squeeze glutes to lift hips toward ceiling.","Form a straight line from knees to shoulders at the top.","Lower with control without touching floor between reps."],mistakes:["Pushing through toes instead of heels","Hyperextending lower back at top — stop when knees, hips, shoulders align","Not squeezing glutes — this is the whole point of the exercise"],equipment:{primary:"Bodyweight to start",progression:"Place 25 lb DB on hips when 3×12 feels easy"},tip:"Once 12 reps is easy, place a dumbbell on your hips for added resistance."},"Hammer Curls":{steps:["Stand tall, dumbbells at sides, palms facing each other (neutral grip).","Keep elbows tucked at your sides.","Curl weights up keeping palms facing each other throughout.","Squeeze at top.","Lower with control over 2–3 seconds."],mistakes:["Rotating wrists during the rep — keep palms facing each other entire time","Swinging to use bigger weight","Elbows drifting forward"],equipment:{primary:"Medium band, stand on it",alt:"Or use your two 25 lb DBs"},tip:"Hammer curls hit the brachialis (deeper arm muscle) and forearms — they make your arms look thicker than regular curls."},"Tricep Kickbacks":{steps:["Hinge forward at hips, light dumbbell in one hand.","Pin upper arm against your side, parallel to the floor.","Forearm hangs straight down at start.","Extend forearm back until arm is fully straight.","Squeeze tricep, then return forearm to start."],mistakes:["Letting upper arm drop or move — it must stay pinned and parallel to floor","Using too much weight — lose the form, lose the benefit","Not fully extending — you want a hard contraction at the back"],equipment:{primary:"Lightest band (25 lb DB will be too heavy for kickbacks)"},tip:"Do one arm at a time so you can pay attention to form. Use the free hand to brace if needed."},"Dead Bug":{steps:["Lie on your back, arms straight up over chest, knees bent at 90° over hips.","Press lower back into the floor and keep it there.","Slowly lower your right arm overhead and left leg toward floor at the same time.","Stop just before your back arches off the floor.","Return to start, switch sides. That's one rep per side."],mistakes:["Lower back lifting off floor — go less far on the limb extension","Rushing the movement — slower is harder and more effective","Holding breath — exhale as limbs extend"],equipment:{primary:"Bodyweight"},tip:"If it feels too easy, slow it down. This should burn in your core after 5–6 reps."},"External Rotations":{steps:["Stand or sit with elbow tucked tight against your side, bent at 90°.","Hold a light band, very light dumbbell (2–5 lb), or even nothing.","Keeping elbow glued to your side, rotate your forearm outward away from your body.","Move slowly — about 2 seconds out, 2 seconds back.","Only your forearm moves. Stop when you feel resistance."],mistakes:["Letting elbow drift away from side — pin it like there's a tennis ball under your armpit","Using too much weight — this is rehab, not strength training","Rotating too far — only as far as comfortable"],equipment:{primary:"Lightest band — anchor at elbow height",alt:"Bands are ideal here, much better than light dumbbells"},tip:"This is the most important exercise for your shoulder. Do it every workout, even when fully healthy."},"Scapular Squeezes":{steps:["Stand or sit tall, arms relaxed at sides.","Pull both shoulder blades together as if pinching a pencil between them.","Hold the squeeze for 3 full seconds.","Relax to start position.","Repeat for prescribed reps."],mistakes:["Shrugging shoulders up toward ears — pull DOWN and BACK","Rushing — the 3-second hold is the work","Not engaging at all — really squeeze hard"],equipment:{primary:"Bodyweight"},tip:"Do these throughout the day at your desk. Your posture will thank you."},"Wall Slides":{steps:["Stand with back, glutes, and head against a wall, feet ~6 inches forward.","Press arms back against the wall in a 'W' shape (elbows bent at 90°).","Keeping arms in contact with the wall, slide them up overhead into a 'Y'.","Slowly lower back to W position.","If arms can't stay flat against wall, that's normal — go as far as you can."],mistakes:["Lower back arching off the wall — engage core to keep it pressed","Rushing — slow is the point","Forcing arms flat — work in your range, don't strain"],equipment:{primary:"Bodyweight (just need a wall)"},tip:"These look easy but they expose all your shoulder mobility limits. They get easier fast."},"Prone Y-T-W":{steps:["Lie face down on the floor or a bench, arms extended overhead.","Y: Lift both arms straight up overhead in a 'Y' shape, thumbs up. Lower.","T: Lift both arms straight out to the sides in a 'T'. Lower.","W: Bend elbows and lift arms in a 'W' shape, squeezing shoulder blades. Lower.","That's one rep of each — repeat for prescribed sets."],mistakes:["Cranking neck up to look forward — keep face down or just barely lifted","Adding weight too soon — bodyweight is plenty for weeks","Shrugging shoulders — pull blades down and back"],equipment:{primary:"Bodyweight on floor or bench",progression:"Add 2–5 lb plates only after weeks of pain-free reps"},tip:"Each shape targets different parts of your upper back. The full sequence is essential for shoulder health."},"Inverted Rows":{steps:["Set up under a sturdy bar (pull-up bar set low) or under a sturdy table.","Hold the bar with overhand grip slightly wider than shoulders.","Hang with body straight from heels to head, arms extended.","Pull chest to the bar by squeezing shoulder blades and bending elbows.","Lower with control to start."],mistakes:["Letting hips sag — keep body in a straight line","Pulling with arms only — initiate by squeezing shoulder blades back","Going too vertical too fast — start at an easier angle and progress"],equipment:{primary:"Sturdy table or pull-up bar set low",alt:"Heavier band anchored low and pulled to chest also works"},tip:"The lower the bar (more horizontal your body), the harder. Start at an angle you can do for 8–10 clean reps."},"Push-ups":{steps:["Week 7 — Wall: Stand arm's length from wall, palms flat, lower chest to wall, push back.","Week 8 — Incline: Hands on couch/stairs/bench, body straight, lower chest to surface, push up.","Week 9 — Floor: Standard push-up, body straight from head to heels.","In all cases: elbows track at ~45° from body (not flared out wide).","Lower for 2 seconds, push up for 1. Quality over quantity."],mistakes:["Elbows flaring out to 90° — terrible for the shoulders, especially yours","Hips sagging or piking — body must be straight","Going too fast — the controlled descent builds strength and protects the shoulder"],equipment:{primary:"Bodyweight (wall → incline → floor over 3 weeks)"},tip:"Don't go back to high-volume daily push-ups EVER. 2–3x/week with controlled reps is the way."},"Light DB Shoulder Press":{steps:["Sit or stand with light dumbbells at shoulder height, palms forward.","Engage core, ribs down (don't arch your back).","Press dumbbells straight up overhead until arms are extended (don't lock elbows hard).","Lower slowly to shoulder height with control.","Stop the second you feel ANY shoulder pain."],mistakes:["Going too heavy too fast — start with 5–10 lbs even if it feels silly","Arching back to press — engage core","Pressing too far back behind your head — straight up"],equipment:{primary:"Two 25 lb DBs (start MUCH lighter — use a band first)",alt:"Lighter band anchored at floor, press up — better starting point"},tip:"If lateral raises felt fine before, they probably won't now with your acromion. Skip them or use very light weight to 60° max."}};const getExerciseDetails=name=>{// Handle the push-up progression key matching
